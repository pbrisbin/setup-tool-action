name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - uses: https://data.forgejo.org/actions/setup-node@v4
        with:
          cache: "yarn"
          cache-dependency-path: yarn.lock
          node-version-file: .nvmrc
      - run: yarn
      - run: yarn test
      - run: yarn build
      - uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: dist
          path: dist/index.js
          if-no-files-found: error

  commitlint:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 # need to get back to base
      - uses: https://data.forgejo.org/actions/setup-node@v4
      - name: Install
        run: |
          npm install --save-dev @commitlint/cli
          npm install --save-dev @commitlint/config-conventional
      - name: Run
        run: |
          npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --color
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  integration:
    needs:
      - test

    # NB. no real way to do this on Codeberg
    # strategy:
    #   matrix:
    #     runner:
    #       - ubuntu-latest
    #       - macos-latest
    #       - windows-latest
    #   fail-fast: false

    runs-on: docker

    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest

    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: dist
          path: dist # overwrite dist/index.js

      - name: Validate inputs
        run: ./bin/validate-inputs

      - name: HLint
        id: setup-hlint
        uses: ./
        with:
          name: "hlint"
          version: "3.5"
          url: "https://github.com/ndmitchell/{name}/releases/download/v{version}/{name}-{version}-{arch}-{os}.{ext}"
          subdir: "{name}-{version}"
          os-darwin: osx
          os-win32: windows
          arch: x86_64
      - run: ls -l '${{ steps.setup-hlint.outputs.directory }}'
      - run: ls -l '${{ steps.setup-hlint.outputs.file }}'
      - run: hlint --version

      - name: HLint, inferred latest
        id: setup-hlint-latest
        uses: ./
        with:
          name: "hlint"
          url: "https://github.com/ndmitchell/{name}/releases/download/v{version}/{name}-{version}-{arch}-{os}.{ext}"
          subdir: "{name}-{version}"
          os-darwin: osx
          os-win32: windows
          arch: x86_64
          github-token-for-latest: ${{ secrets.GH_TOKEN }}
      - run: ls -l '${{ steps.setup-hlint-latest.outputs.directory }}'
      - run: ls -l '${{ steps.setup-hlint-latest.outputs.file }}'
      - run: hlint --version

      - name: DMS
        id: setup-dms
        uses: ./
        with:
          name: dms
          version: latest
          url: "https://releases.deadmanssnitch.com/field-agent/{version}/{name}_{os}_{arch}.{ext}"
          os-darwin: macos
          os-win32: windows
          arch: amd64
      - run: ls -l '${{ steps.setup-dms.outputs.directory }}'
      - run: ls -l '${{ steps.setup-hlint.outputs.file }}'
      - run: dms --version

      - name: Pandoc
        id: setup-pandoc
        uses: ./
        with:
          name: pandoc
          version: 2.19.2
          url: "https://github.com/jgm/{name}/releases/download/{version}/{name}-{version}-{os}-{arch}.{ext}"
          url-darwin: "https://github.com/jgm/{name}/releases/download/{version}/{name}-{version}-macOS.zip"
          subdir: "{name}-{version}/bin"
          subdir-win32: "{name}-{version}"
          os-win32: windows
          arch: x86_64
          arch-linux: amd64
      - run: ls -l '${{ steps.setup-pandoc.outputs.directory }}'
      - run: ls -l '${{ steps.setup-hlint.outputs.file }}'
      - run: pandoc --version

      - name: Bluebook
        uses: ./
        with:
          name: bluebook
          version: 1.0.0.0
          url: "https://github.com/pbrisbin/{name}/releases/download/v{version}/{name}-{os}-{arch}"
          no-extract: "true"
      - run: bluebook --help

      - name: Bluebook, inferred latest
        uses: ./
        with:
          name: bluebook
          url: "https://github.com/pbrisbin/{name}/releases/download/v{version}/{name}-{os}-{arch}"
          no-extract: "true"
          github-token-for-latest: ${{ secrets.GH_TOKEN }}
      - run: bluebook --help

      #
      # TODO: bring back private repo example
      #
